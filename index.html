<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Simulado Concursos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Simulado de Concursos</h1>

<input type="password" id="senha" placeholder="Digite a chave">
<button onclick="validar()">Entrar</button>

<div id="sistema" style="display:none;">

  <select id="banco">
    <option value="fenac">FENAC</option>
    <option value="bb">Banco do Brasil</option>
    <option value="nh">Prefeitura NH</option>
  </select>

  <select id="disciplina">
    <option value="todas">Todas</option>
    <option value="portugues">Português</option>
    <option value="matematica">Matemática</option>
    <option value="informatica">Informática</option>
    <option value="bancarios">Bancários</option>
    <option value="logica">Lógica</option>
  </select>

  <button onclick="carregar()">Iniciar Prova</button>
  <button onclick="verHistorico()">Ver Histórico</button>

  <div id="timer"></div>
  <div id="quiz"></div>
  <div id="resultado"></div>

</div>

<!-- 🔥 IMPORTANTE: NÃO COLOQUE JS AQUI -->
<script src="app.js"></script>

</body>
</html>
